prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    # Disable Prometheus volume persistence
    storageSpec: {}
    # Override Prometheus server resource requests to fit on t3.medium
    resources:
      requests:
        memory: "250Mi"
        cpu: "100m"
      limits:
        memory: "500Mi"
        cpu: "200m"

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace', 'pod']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'ai-agent-webhook'
    receivers:
    - name: 'ai-agent-webhook'
      webhook_configs:
      # Directs Alertmanager alerts to the local/cluster AI Agent endpoint
      - url: 'http://ai-agent-service.production.svc.cluster.local:8000/alerts'
        send_resolved: true
  # Override Alertmanager resource requests
  alertmanagerSpec:
    resources:
      requests:
        memory: "50Mi"
        cpu: "20m"
      limits:
        memory: "100Mi"
        cpu: "50m"

grafana:
  enabled: true
  adminPassword: "admin"
  # Disable Grafana persistence to run completely in-memory
  persistence:
    enabled: false
  # Override Grafana resource requests
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "250Mi"
      cpu: "100m"

prometheus-node-exporter:
  resources:
    requests:
      memory: "20Mi"
      cpu: "10m"
    limits:
      memory: "50Mi"
      cpu: "20m"

kube-state-metrics:
  resources:
    requests:
      memory: "50Mi"
      cpu: "10m"
    limits:
      memory: "100Mi"
      cpu: "50m"


